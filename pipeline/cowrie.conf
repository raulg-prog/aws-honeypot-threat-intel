input {
  file {
    path => "/home/ubuntu/cowrie.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  }
}

output {
  opensearch {
    hosts => ["https://search-honeypot-...amazonaws.com"]
    auth_type => {
      type => "basic"
      user => "testmaster"
      password => "password"
    }
    index => "cowrie-geo-%{+YYYY.MM.dd}"
    ssl => true
  }
}
